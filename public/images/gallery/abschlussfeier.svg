<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg4)"/>
  
  <!-- Confetti -->
  <rect x="100" y="80" width="15" height="15" fill="#FF9800" transform="rotate(30 107 87)"/>
  <rect x="200" y="150" width="12" height="12" fill="#4CAF50" transform="rotate(45 206 156)"/>
  <rect x="300" y="60" width="18" height="18" fill="#E91E63" transform="rotate(15 309 69)"/>
  <rect x="450" y="120" width="14" height="14" fill="#00BCD4" transform="rotate(60 457 127)"/>
  <rect x="700" y="80" width="16" height="16" fill="#FFEB3B" transform="rotate(25 708 88)"/>
  <rect x="850" y="140" width="12" height="12" fill="#4CAF50" transform="rotate(50 856 146)"/>
  <rect x="950" y="70" width="15" height="15" fill="#FF9800" transform="rotate(35 957 77)"/>
  <rect x="1050" y="130" width="14" height="14" fill="#E91E63" transform="rotate(70 1057 137)"/>
  <circle cx="150" cy="200" r="8" fill="#FFEB3B"/>
  <circle cx="350" cy="180" r="6" fill="#00BCD4"/>
  <circle cx="550" cy="150" r="7" fill="#FF9800"/>
  <circle cx="750" cy="170" r="8" fill="#4CAF50"/>
  <circle cx="1000" cy="200" r="6" fill="#E91E63"/>
  
  <!-- Graduation Cap -->

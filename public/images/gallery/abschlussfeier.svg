    <ellipse cx="-12" cy="-12" rx="8" ry="12" fill="rgba(255,255,255,0.3)"/>
  </g>
  <g transform="translate(1000, 280)">
    <ellipse cx="0" cy="0" rx="35" ry="45" fill="#00BCD4"/>
    <polygon points="-5,45 5,45 0,58" fill="#0097A7"/>
    <line x1="0" y1="58" x2="0" y2="140" stroke="#9E9E9E" stroke-width="2"/>
    <ellipse cx="-12" cy="-12" rx="8" ry="12" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Stars -->
  <polygon points="600,100 608,125 635,125 614,140 622,165 600,150 578,165 586,140 565,125 592,125" fill="#FFD700"/>
  <polygon points="400,250 405,265 420,265 408,275 413,290 400,280 387,290 392,275 380,265 395,265" fill="#FFEB3B" opacity="0.8"/>
  <polygon points="800,230 805,245 820,245 808,255 813,270 800,260 787,270 792,255 780,245 795,245" fill="#FFEB3B" opacity="0.8"/>
  
  <!-- Text -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">

    <line x1="120" y1="50" x2="200" y2="50" stroke="#FFD700" stroke-width="3"/>
    <line x1="200" y1="50" x2="200" y2="130" stroke="#FFD700" stroke-width="3"/>
    <rect x="190" y="130" width="20" height="30" fill="#FFD700"/>
    <path d="M190,160 L200,180 L210,160" fill="#FFD700"/>
  </g>
  
  <!-- Balloons -->
  <g transform="translate(200, 200)">
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#E91E63"/>
    <polygon points="-5,50 5,50 0,65" fill="#C2185B"/>
    <line x1="0" y1="65" x2="0" y2="150" stroke="#9E9E9E" stroke-width="2"/>
    <ellipse cx="-15" cy="-15" rx="10" ry="15" fill="rgba(255,255,255,0.3)"/>
  </g>
  <g transform="translate(950, 180)">
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#4CAF50"/>

  </text>
  
  <!-- Placeholder notice -->
  <rect x="400" y="580" width="400" height="40" rx="20" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="607" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">
    📷 Platzhalter – Echtes Foto einfügen

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg3)"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="150" r="100" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1050" cy="500" r="150" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Open Book -->
  <g transform="translate(400, 150)">
    <!-- Book spine shadow -->
    <ellipse cx="200" cy="280" rx="180" ry="20" fill="rgba(0,0,0,0.2)"/>
    
    <!-- Left page -->
    <path d="M200,50 Q100,60 50,70 L50,250 Q100,240 200,230 Z" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="2"/>
    <!-- Left page lines -->
    <line x1="70" y1="100" x2="180" y2="95" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="70" y1="130" x2="180" y2="125" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="70" y1="160" x2="180" y2="155" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="70" y1="190" x2="180" y2="185" stroke="#BDBDBD" stroke-width="2"/>
    
    <!-- Right page -->
    <path d="M200,50 Q300,60 350,70 L350,250 Q300,240 200,230 Z" fill="#FFFDE7" stroke="#E0E0E0" stroke-width="2"/>
    <!-- Right page lines -->
    <line x1="220" y1="95" x2="330" y2="100" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="220" y1="125" x2="330" y2="130" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="220" y1="155" x2="330" y2="160" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="220" y1="185" x2="330" y2="190" stroke="#BDBDBD" stroke-width="2"/>
    
    <!-- Book spine -->
    <rect x="195" y="50" width="10" height="180" fill="#8D6E63"/>
  </g>
  
  <!-- Trophy -->
  <g transform="translate(850, 180)">
    <!-- Cup -->
    <path d="M50,0 L100,0 L90,80 L60,80 Z" fill="#FFD700"/>
    <ellipse cx="75" cy="0" rx="25" ry="8" fill="#FFC107"/>
    <!-- Handles -->
    <path d="M50,20 Q20,20 20,50 Q20,70 50,70" fill="none" stroke="#FFD700" stroke-width="8"/>
    <path d="M100,20 Q130,20 130,50 Q130,70 100,70" fill="none" stroke="#FFD700" stroke-width="8"/>
    <!-- Base -->
    <rect x="55" y="80" width="40" height="15" fill="#FFC107"/>
    <rect x="45" y="95" width="60" height="10" fill="#FFD700"/>
    <ellipse cx="75" cy="105" rx="35" ry="8" fill="#FFC107"/>
    <!-- Star on trophy -->
    <polygon points="75,25 80,40 95,40 83,50 88,65 75,55 62,65 67,50 55,40 70,40" fill="#FFFFFF"/>
  </g>
  
  <!-- Medal -->
  <g transform="translate(250, 200)">
    <path d="M50,0 L60,30 L50,30 L40,60 L60,60 L50,30 L40,30 Z" fill="#E91E63"/>
    <circle cx="50" cy="90" r="35" fill="#FFD700" stroke="#FFC107" stroke-width="4"/>
    <text x="50" y="100" font-family="system-ui" font-size="30" fill="#5D4037" text-anchor="middle" font-weight="bold">1</text>
  </g>
  
  <!-- Text -->
  <text x="600" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    📚 Lesewettbewerb
  </text>
  <text x="600" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Preisverleihung
  </text>
  
  <!-- Placeholder notice -->
  <rect x="400" y="600" width="400" height="40" rx="20" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="627" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle">
    📷 Platzhalter – Echtes Foto einfügen
  </text>
</svg>